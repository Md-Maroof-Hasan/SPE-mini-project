---
- name: Deploy Docker Calculator
  hosts: localhost
  become: false

  tasks:

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started

    - name: Pull Docker Image from DockerHub
      community.docker.docker_image:
        name: mdmaroof05/spe-calculator
        source: pull

    - name: Run Docker Container
      community.docker.docker_container:
        name: spe-calculator
        image: mdmaroof05/spe-calculator
        state: started
        tty: true
        detach: true